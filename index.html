<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 추천</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.875rem;
      color: #86868b;
      margin-bottom: 32px;
    }

    button {
      display: block;
      width: 100%;
      padding: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: #0071e3;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #0077ed;
    }

    button:active {
      background: #006edb;
    }

    .results {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .results:empty {
      display: none;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .row-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: #86868b;
      width: 36px;
      flex-shrink: 0;
    }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .ball {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 700;
      color: #fff;
    }

    .ball.yellow { background: #fbc400; color: #1d1d1f; }
    .ball.blue   { background: #69c8f2; color: #1d1d1f; }
    .ball.red    { background: #ff7272; }
    .ball.gray   { background: #aaa; }
    .ball.green  { background: #b0d840; color: #1d1d1f; }
  </style>
</head>
<body>
  <div class="container">
    <h1>로또 번호 추천</h1>
    <p class="subtitle">1~45 중 6개 번호 · 5세트</p>
    <button id="generate">번호 추천 받기</button>
    <div class="results" id="results"></div>
  </div>

  <script>
    const COLORS = ["yellow", "blue", "red", "gray", "green"];

    function getBallColor(num) {
      if (num <= 10) return "yellow";
      if (num <= 20) return "blue";
      if (num <= 30) return "red";
      if (num <= 40) return "gray";
      return "green";
    }

    function generateSet() {
      const nums = new Set();
      while (nums.size < 6) {
        nums.add(Math.floor(Math.random() * 45) + 1);
      }
      return [...nums].sort((a, b) => a - b);
    }

    function renderResults(sets) {
      const container = document.getElementById("results");
      container.innerHTML = sets.map((nums, i) => `
        <div class="row">
          <span class="row-label">${String(i + 1).padStart(2, " ")}조</span>
          <div class="balls">
            ${nums.map(n => `<span class="ball ${getBallColor(n)}">${n}</span>`).join("")}
          </div>
        </div>
      `).join("");
    }

    document.getElementById("generate").addEventListener("click", () => {
      const sets = Array.from({ length: 5 }, generateSet);
      renderResults(sets);
    });
  </script>
</body>
</html>
